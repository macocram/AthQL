<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AthQL — Athena Query Manager</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        var saved = localStorage.getItem("athql-theme");
        var mode =
          saved === "dark" || saved === "light"
            ? saved
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", mode);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0b0f14; color: #e2e8f0; transition: background 0.3s;">
        <div style="font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em;">AthQL</div>
        <div style="font-size: 12px; color: #94a3b8; margin-bottom: 24px;">Athena Query Manager</div>
        <div style="width: 24px; height: 24px; border: 2px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 40px;"></div>
        <div style="position: absolute; bottom: 24px; font-size: 10px; color: #64748b; letter-spacing: 0.05em; font-weight: 500; display: flex; align-items: center; gap: 6px; user-select: none;">
          CRAFTED BY <a href="https://github.com/amit3200" target="_blank" rel="noopener noreferrer" style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 11px; font-weight: 700; color: #60a5fa; text-decoration: none; background: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.2); padding: 2px 6px; border-radius: 4px; transition: all 0.15s ease;">@amit3200</a>
        </div>
        <style>
          @keyframes spin {
            to { transform: rotate(360deg); }
          }
          #root a:hover {
            background: #3b82f6 !important;
            color: #ffffff !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3) !important;
          }
          html[data-theme="light"] #root > div {
            background: #e9edf2 !important;
            color: #1f2937 !important;
          }
          html[data-theme="light"] #root a {
            color: #2563eb !important;
            background: rgba(37, 99, 235, 0.08) !important;
            border-color: rgba(37, 99, 235, 0.15) !important;
          }
          html[data-theme="light"] #root a:hover {
            background: #2563eb !important;
            color: #ffffff !important;
            border-color: #2563eb !important;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25) !important;
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
